required_facility_types:
  - pediatric_clinic
  - general_hospital
  - community_center
  - district_office
  - city_hall
  - childcare_center
  - kindergarten
  - park
  - library_culture

optional_facility_types:
  - family_medicine
  - large_retail_optional

distance_limits:
  pediatric_clinic: 800
  family_medicine: 800
  general_hospital: 800
  community_center: 800
  district_office: 800
  city_hall: 800
  childcare_center: 800
  kindergarten: 800
  park: 800
  library_culture: 800
  large_retail_optional: 800

scoring:
  scoring_method: "full_score_with_decay_after_800m"
  distance_score_method: "full_score_with_decay_after_800m"
  full_score_distance_m: 800
  zero_score_distance_m: 1600
  facility_score_formula: "DistanceAdjustedScore(W, D) = W × max(0, min(1, 2 − D / 800))"
  facility_score_description: "800m 이내는 시설 유형별 최대 점수 W를 부여하고, 800m 초과 후 거리에 비례해 감점하여 1600m 이상에서 0점."
  category_aggregation: "additive_capped_type_max_scores_v1"
  category_aggregation_description: "category_score = min(100, Σ DistanceAdjustedScore(type_max_score[t], distance[t])). 누락된 시설 유형은 0으로 기여."
  category_score_cap: 100
  type_max_scores:
    pediatric_clinic: 80
    family_medicine: 40
    general_hospital: 20
    community_center: 80
    district_office: 20
    city_hall: 0
    childcare_center: 80
    kindergarten: 20
    park: 70
    library_culture: 30
    large_retail_optional: 0
  category_formulas:
    medical:
      cap: 100
      types:
        pediatric_clinic: 80
        family_medicine: 40
        general_hospital: 20
    administration:
      cap: 100
      types:
        community_center: 80
        district_office: 20
    education:
      cap: 100
      types:
        childcare_center: 80
        kindergarten: 20
    leisure:
      cap: 100
      types:
        park: 70
        library_culture: 30
  grid_weights:
    medical: 0.30
    education: 0.30
    administration: 0.10
    leisure: 0.30

category_weights:
  medical:
    pediatric_clinic: 80
    family_medicine: 40
    general_hospital: 20
  administration:
    community_center: 80
    district_office: 20
    city_hall: 0
  education:
    childcare_center: 80
    kindergarten: 20
  leisure:
    park: 70
    library_culture: 30
    large_retail_optional: 0
  overall:
    medical_score: 0.30
    education_score: 0.30
    admin_score: 0.10
    leisure_score: 0.30

pedestrian_network:
  enabled: true
  process_by_district: true
  service_name: "TbTraficWlkNet"
  source_url: "https://data.seoul.go.kr/dataList/OA-21208/A/1/datasetView.do"
  supplemental_services:
    crosswalk:
      service_name: "tbTraficCrsng"
      source_url: "https://data.seoul.go.kr/dataList/OA-21209/A/1/datasetView.do"
      raw_file: "data/raw_api/pedestrian_network/supplemental/crosswalk.json"
      include_in_graph: true
  type_codebook:
    path: "data/도보네트워크_링크노드유형코드.xlsx"
    link_sheet: "링크유형코드"
    node_sheet: "노드유형코드"
  source:
    type: "local_or_openapi"
    raw_dir: "data/raw/pedestrian_network"
    api_cache_dir: "data/raw_api/pedestrian_network"
  crs:
    source: "EPSG:4326"
    calculation: "EPSG:5179"
    web_output: "EPSG:4326"
  snap:
    grid_snap_max_distance_m: 200
    facility_snap_max_distance_m: 200
  buffer:
    facility_search_buffer_m: 3000
    network_buffer_m: 3000
  distance:
    use_length_column_if_available: true
    length_column_candidates:
      - "length"
      - "length_m"
      - "LNKG_LEN"
      - "link_len"
      - "링크길이"
      - "연장"
      - "거리"
  columns:
    node_type: "NODE_TYPE"
    node_wkt: "NODE_WKT"
    node_id: "NODE_ID"
    node_type_code: "NODE_TYPE_CD"
    link_wkt: "LNKG_WKT"
    link_id: "LNKG_ID"
    link_type_code: "LNKG_TYPE_CD"
    from_node: "BGNG_LNKG_ID"
    to_node: "END_LNKG_ID"
    length_m: "LNKG_LEN"
    district_code: "SGG_CD"
    district_name: "SGG_NM"
    collected_at: "WORK_DTTM"
  output:
    save_district_intermediate: true
    intermediate_dir: "data/processed/pedestrian_network"
    distance_dir: "data/processed/network_by_district"
    public_network_overlay_dir: "public/data/network"
  fallback:
    allow_euclidean_fallback: true
    record_fallback_in_metadata: true

weights:
